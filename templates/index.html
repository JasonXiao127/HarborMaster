<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Docker Resource Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6 text-gray-800">
    <div class="max-w-5xl mx-auto">
        
        <div id="errorBanner" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded shadow-sm" role="alert">
            <p class="font-bold">Connection Error</p>
            <p id="errorText"></p>
        </div>

        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">Docker Resource Monitor</h1>
            <select id="rate" class="border p-1 rounded bg-white shadow-sm" onchange="resetInterval()">
                <option value="1000">1s Polling</option>
                <option value="3000" selected>3s Polling</option>
                <option value="5000">5s Polling</option>
            </select>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6 text-center">
            <div class="bg-white p-4 rounded shadow-sm border border-gray-200">
                <p class="text-gray-500">Containers Total CPU</p>
                <p id="totalCpu" class="text-3xl font-bold text-indigo-600">0%</p>
            </div>
            <div class="bg-white p-4 rounded shadow-sm border border-gray-200">
                <p class="text-gray-500">Memory Footprint (of Host)</p>
                <p id="totalMem" class="text-3xl font-bold text-indigo-600">0%</p>
            </div>
        </div>

        <div class="bg-white rounded shadow-sm border border-gray-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="p-4">Container</th>
                        <th class="p-4">Status</th>
                        <th class="p-4">CPU %</th>
                        <th class="p-4">Memory (MB)</th>
                        <th class="p-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="5" class="p-4 text-center text-gray-400">Loading containers...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let timer;
        const errorBanner = document.getElementById('errorBanner');
        const errorText = document.getElementById('errorText');

        async function update() {
            try {
                // FIXED: Added cache-busting timestamp (?_=${Date.now()}) to bypass Brave/Edge caching filters
                const res = await fetch(`/api/metrics?_=${Date.now()}`);
                const data = await res.json();
                
                if (res.status !== 200 || data.error) {
                    showError(data.error || "An unknown backend error occurred.");
                    return;
                }

                hideError();
                
                document.getElementById('totalCpu').innerText = data.system.containers_total_cpu_percent + '%';
                document.getElementById('totalMem').innerText = data.system.containers_total_mem_percent + '%';
                
                const body = document.getElementById('tableBody');
                if (data.containers.length === 0) {
                    body.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-gray-400">No containers found.</td></tr>`;
                    return;
                }

                body.innerHTML = data.containers.map(c => `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-4 font-medium">
                            <div>${c.name}</div>
                            <div class="text-xs text-gray-400 font-normal">${c.id}</div>
                        </td>
                        <td class="p-4"><span class="px-2 py-1 rounded text-xs font-semibold ${c.status==='running'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${c.status}</span></td>
                        <td class="p-4">${c.status==='running' ? c.cpu + '%' : '-'}</td>
                        <td class="p-4">${c.status==='running' ? `${c.memory} MB / ${c.memory_limit} MB` : '-'}</td>
                        <td class="p-4 text-right">
                            ${c.status==='running' ? 
                                `<button onclick="action('${c.id}','stop')" class="text-red-500 hover:underline mr-2">Stop</button>
                                 <button onclick="action('${c.id}','restart')" class="text-blue-500 hover:underline">Restart</button>` :
                                `<button onclick="action('${c.id}','start')" class="text-green-500 hover:underline">Start</button>`
                            }
                        </td>
                    </tr>
                `).join('');
            } catch (e) { 
                showError("Cannot connect to server. Ensure container is running.");
            }
        }

        function showError(msg) {
            errorText.innerText = msg;
            errorBanner.classList.remove('hidden');
        }

        function hideError() {
            errorBanner.classList.add('hidden');
        }

        async function action(id, act) {
            try {
                // Prevent aggressive browser actions caching
                const res = await fetch(`/api/containers/${id}/${act}?_=${Date.now()}`, {method:'POST'});
                const data = await res.json();
                if (data.error) alert(data.error);
                update();
            } catch (e) {
                alert("Action failed to execute.");
            }
        }

        function resetInterval() {
            clearInterval(timer);
            const rate = document.getElementById('rate').value;
            timer = setInterval(update, parseInt(rate));
            update();
        }
        
        resetInterval();
    </script>
</body>
</html>
